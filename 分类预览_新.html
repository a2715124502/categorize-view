<html lang="zh-CN">

<meta charset="UTF-8">

<title>十字绣图组分类预览</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",sans-serif;background:#f5f5f7;color:#1d1d1f;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:#1d1d1f;color:#fff;padding:0 24px;height:52px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.header h1{font-size:17px;font-weight:600}
.header .meta{font-size:12px;color:#888;margin-left:auto}
.layout{display:flex;flex:1;min-height:0}
.sidebar{width:186px;background:#fff;border-right:1px solid #e5e5e5;overflow-y:auto;flex-shrink:0}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.si{display:flex;align-items:center;gap:9px;padding:10px 14px;cursor:pointer;border-left:3px solid transparent;font-size:13.5px;color:#555;transition:all .12s;user-select:none}
.si:hover{background:#f5f5f7;color:#1d1d1f}
.si.active{background:#eff6ff;border-left-color:#0071e3;color:#0071e3;font-weight:600}
.si .em{font-size:17px;width:22px;text-align:center;flex-shrink:0}
.si .nm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si .ct{font-size:11px;color:#aaa;background:#f2f2f2;border-radius:9px;padding:1px 7px;flex-shrink:0}
.si.active .ct{background:#dbeafe;color:#0071e3}
.main{flex:1;overflow-y:auto;padding:20px 24px}
.main::-webkit-scrollbar{width:6px}
.main::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}
.cat-bar{display:flex;align-items:baseline;gap:12px;margin-bottom:16px}
.cat-title{font-size:22px;font-weight:700}
.cat-cnt{font-size:13px;color:#999}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.card{background:#fff;border-radius:11px;overflow:hidden;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.07);transition:transform .14s,box-shadow .14s}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.card img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#efefef}
.card-info{padding:8px 10px 10px}
.card-cn{font-size:13px;font-weight:600;line-height:1.3;color:#1d1d1f}
.card-folder{font-size:11px;color:#aaa;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:999;align-items:center;justify-content:center}
.lb.open{display:flex}
.lb-box{background:#fff;border-radius:14px;width:min(90vw,860px);max-height:88vh;display:flex;flex-direction:column;overflow:hidden}
.lb-hd{padding:14px 18px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #eee;flex-shrink:0}
.lb-hd h2{font-size:16px;font-weight:700;flex:1}
.lb-hd .lbsub{font-size:12px;color:#999}
.lb-close{width:30px;height:30px;border-radius:50%;background:#f0f0f0;border:none;cursor:pointer;font-size:16px;color:#555;display:flex;align-items:center;justify-content:center}
.lb-close:hover{background:#e0e0e0}
.lb-imgs{padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:9px;overflow-y:auto}
.lb-img{border-radius:8px;overflow:hidden;aspect-ratio:1;background:#f0f0f0}
.lb-img img{width:100%;height:100%;object-fit:cover;display:block}
</style>
</head>

let active = 0;
const sidebar = document.getElementById('sidebar');
CATS.forEach((cat, i) => {
  const el = document.createElement('div');
  el.className = 'si' + (i === 0 ? ' active' : '');
  el.innerHTML = `<span class="em">${cat.emoji}</span><span class="nm">${cat.id}</span><span class="ct">${cat.groups.length}</span>`;
  el.onclick = () => select(i);
  sidebar.appendChild(el);
});
function select(i) {
  active = i;
  sidebar.querySelectorAll('.si').forEach((el, idx) => el.classList.toggle('active', idx === i));
  render();
  document.getElementById('main').scrollTop = 0;
}
function render() {
  const cat = CATS[active];
  document.getElementById('catTitle').textContent = cat.emoji + ' ' + cat.id;
  document.getElementById('catCnt').textContent = cat.groups.length + ' 个图组';
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cat.groups.forEach(g => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<img src="../image_test/${g.folder}/${g.cover}" loading="lazy" onerror="this.style.background='#e8e8e8'">
      <div class="card-info"><div class="card-cn">${g.cn}</div><div class="card-folder">${g.folder}</div></div>`;
    card.onclick = () => openLB(g);
    grid.appendChild(card);
  });
}
function openLB(g) {
  document.getElementById('lbTitle').textContent = g.cn;
  document.getElementById('lbSub').textContent = g.folder + ' · ' + g.imgs.length + ' 张';
  document.getElementById('lbImgs').innerHTML = g.imgs.map(img =>
    `<div class="lb-img"><img src="../image_test/${g.folder}/${img}" loading="lazy" onerror="this.style.background='#e8e8e8'"></div>`
  ).join('');
  document.getElementById('lb').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLB(e) {
  if (e && e.target !== document.getElementById('lb')) return;
  document.getElementById('lb').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { document.getElementById('lb').classList.remove('open'); document.body.style.overflow=''; }
});
render();
</script>
